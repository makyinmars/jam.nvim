name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          version: stable
          neovim: true

      - name: Install test dependencies
        run: |
          git clone --depth=1 https://github.com/nvim-lua/plenary.nvim /tmp/plenary.nvim
          git clone --depth=1 https://github.com/nvim-telescope/telescope.nvim /tmp/telescope.nvim

      - name: Run smoke tests
        run: |
          nvim --headless -u NONE \
            --cmd "set runtimepath^=/tmp/plenary.nvim" \
            --cmd "set runtimepath^=/tmp/telescope.nvim" \
            --cmd "set runtimepath^=$GITHUB_WORKSPACE" \
            --cmd "runtime plugin/jam.lua" \
            -c "luafile tests/smoke.lua" \
            -c "quit"
          nvim --headless -u NONE \
            --cmd "set runtimepath^=$GITHUB_WORKSPACE" \
            -c "luafile tests/oauth.lua" \
            -c "quit"
          nvim --headless -u NONE \
            --cmd "set runtimepath^=$GITHUB_WORKSPACE" \
            -c "luafile tests/provider.lua" \
            -c "quit"
          nvim --headless -u NONE \
            --cmd "set runtimepath^=$GITHUB_WORKSPACE" \
            -c "luafile tests/youtube_music.lua" \
            -c "quit"
          nvim --headless -u NONE \
            --cmd "set runtimepath^=/tmp/plenary.nvim" \
            --cmd "set runtimepath^=/tmp/telescope.nvim" \
            --cmd "set runtimepath^=$GITHUB_WORKSPACE" \
            -l tests/picker.lua

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .
